appId: com.htacalibr8s.desktop
productName: HTA Calibr8s
copyright: Copyright (c) 2026 HTA Calibr8s

win:
  target: nsis
  icon: resources/icon.ico

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: false
  # Install WireGuard MSI silently before the app files are laid down.
  # WireGuard must be per-machine so the tunnel service can run as SYSTEM.
  include: resources/installer-extras.nsh

directories:
  output: release

afterPack: scripts/after-pack.js

files:
  - dist/**/*
  - resources/**/*
  - "!src"
  - "!resources/installer-extras.nsh"
  - "!resources/wireguard-amd64.msi"

asarUnpack:
  - dist/migrations/**/*
  - node_modules/@journeyapps/sqlcipher/lib/binding/**/*.node

publish:
  provider: generic
  url: https://storage.googleapis.com/hta-platform-prod-desktop-releases
