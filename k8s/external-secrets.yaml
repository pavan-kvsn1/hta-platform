# ExternalSecrets - sync GCP Secret Manager to K8s Secrets
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-secrets
  namespace: hta-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: api-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: database-url
    - secretKey: REDIS_URL
      remoteRef:
        key: redis-url
    - secretKey: NEXTAUTH_SECRET
      remoteRef:
        key: nextauth-secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: worker-secrets
  namespace: hta-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: worker-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: database-url
    - secretKey: REDIS_URL
      remoteRef:
        key: redis-url
    - secretKey: RESEND_API_KEY
      remoteRef:
        key: resend-api-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: web-secrets
  namespace: hta-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: web-secrets
    creationPolicy: Owner
  data:
    - secretKey: NEXTAUTH_SECRET
      remoteRef:
        key: nextauth-secret
