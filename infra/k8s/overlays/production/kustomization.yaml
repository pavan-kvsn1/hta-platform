apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hta-platform

resources:
  - ../../base

# Image tags - update these during deployment
images:
  - name: gcr.io/PROJECT_ID/hta-api
    newName: gcr.io/YOUR_PROJECT_ID/hta-api
    newTag: latest
  - name: gcr.io/PROJECT_ID/hta-worker
    newName: gcr.io/YOUR_PROJECT_ID/hta-worker
    newTag: latest

# Production-specific patches
patches:
  # Increase API replicas for production
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: hta-api

  # Increase resource limits for production
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"
    target:
      kind: Deployment
      name: hta-api

commonLabels:
  environment: production

commonAnnotations:
  app.kubernetes.io/version: "1.0.0"
