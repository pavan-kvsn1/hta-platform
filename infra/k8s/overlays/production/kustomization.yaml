apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hta-platform

resources:
  - ../../base
  # Uncomment for canary deployments:
  # - api-canary-deployment.yaml
  # - canary-httproute.yaml

# Image tags - update these during deployment
images:
  - name: gcr.io/PROJECT_ID/hta-api
    newName: gcr.io/YOUR_PROJECT_ID/hta-api
    newTag: latest
  - name: gcr.io/PROJECT_ID/hta-web
    newName: gcr.io/YOUR_PROJECT_ID/hta-web
    newTag: latest
  - name: gcr.io/PROJECT_ID/hta-worker
    newName: gcr.io/YOUR_PROJECT_ID/hta-worker
    newTag: latest

# Production-specific patches
patches:
  # Keep 1 replica on e2-medium (HPA handles scaling if node autoscales)
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: hta-api

labels:
  - pairs:
      environment: production

commonAnnotations:
  app.kubernetes.io/version: "1.0.0"
