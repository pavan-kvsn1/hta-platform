# =============================================================================
# HTA Platform Secrets
# =============================================================================
# IMPORTANT: This is a TEMPLATE. Do NOT commit actual secrets to git.
#
# For production, use one of these approaches:
#   1. Google Secret Manager with External Secrets Operator
#   2. Sealed Secrets
#   3. Kubernetes Secrets created via CI/CD pipeline
#
# To create manually (replace with actual values):
#   kubectl create secret generic hta-secrets \
#     --namespace=hta-platform \
#     --from-literal=database-url='postgresql://...' \
#     --from-literal=redis-url='redis://...' \
#     --from-literal=jwt-secret='...' \
#     --from-literal=resend-api-key='...'
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: hta-secrets
  namespace: hta-platform
  labels:
    app.kubernetes.io/name: hta-platform
type: Opaque
stringData:
  # PostgreSQL connection string
  # Format: postgresql://USER:PASSWORD@HOST:PORT/DATABASE
  database-url: "postgresql://hta_user:CHANGE_ME@postgres:5432/hta_calibration"

  # Redis connection string
  # Format: redis://[:PASSWORD@]HOST:PORT[/DB]
  redis-url: "redis://redis:6379"

  # JWT secret for API authentication
  # Generate with: openssl rand -base64 32
  jwt-secret: "CHANGE_ME_GENERATE_SECURE_SECRET"

  # Resend API key for email delivery
  resend-api-key: "re_CHANGE_ME"
