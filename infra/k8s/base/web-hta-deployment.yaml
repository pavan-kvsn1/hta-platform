apiVersion: apps/v1
kind: Deployment
metadata:
  name: hta-web
  namespace: hta-platform
  labels:
    app: hta-web
    app.kubernetes.io/name: hta-web
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hta-web
  template:
    metadata:
      labels:
        app: hta-web
        app.kubernetes.io/name: hta-web
    spec:
      serviceAccountName: web-hta
      containers:
        - name: web
          image: asia-south1-docker.pkg.dev/hta-platform-prod/production-docker/hta-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
          envFrom:
            - configMapRef:
                name: hta-config
            - secretRef:
                name: web-secrets
            - secretRef:
                name: api-secrets  # For DATABASE_URL if web needs direct DB access
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
        # Cloud SQL Auth Proxy sidecar - handles mTLS to Cloud SQL
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.0
          args:
            - "--private-ip"
            - "--structured-logs"
            - "hta-platform-prod:asia-south1:production-postgres"
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: hta-web
                topologyKey: kubernetes.io/hostname
