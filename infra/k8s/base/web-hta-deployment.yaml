apiVersion: apps/v1
kind: Deployment
metadata:
  name: hta-web
  namespace: hta-platform
  labels:
    app: hta-web
    app.kubernetes.io/name: hta-web
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hta-web
  template:
    metadata:
      labels:
        app: hta-web
        app.kubernetes.io/name: hta-web
    spec:
      serviceAccountName: web-hta
      containers:
        - name: web
          image: gcr.io/PROJECT_ID/hta-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: NEXTAUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: hta-config
                  key: nextauth-url
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: hta-secrets
                  key: nextauth-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hta-secrets
                  key: database-url
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: hta-config
                  key: api-url
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: hta-web
                topologyKey: kubernetes.io/hostname
