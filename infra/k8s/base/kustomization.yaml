apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hta-platform

resources:
  - namespace.yaml
  - service-accounts.yaml
  # - configmap.yaml         # Created manually with kubectl
  # - secrets.yaml           # Using External Secrets Operator instead
  - api-deployment.yaml
  - api-service.yaml
  - web-hta-deployment.yaml
  - web-hta-service.yaml
  - worker-deployment.yaml
  - gateway.yaml  # GKE Gateway API (replaces ingress.yaml)
  - hpa.yaml
  # - ingress.yaml  # DEPRECATED: Use gateway.yaml instead

labels:
  - pairs:
      app.kubernetes.io/part-of: hta-platform
      app.kubernetes.io/managed-by: kustomize
