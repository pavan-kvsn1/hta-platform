apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hta-platform

resources:
  - namespace.yaml
  - service-accounts.yaml
  - configmap.yaml
  - secrets.yaml
  - api-deployment.yaml
  - api-service.yaml
  - web-hta-deployment.yaml
  - web-hta-service.yaml
  - worker-deployment.yaml
  - ingress.yaml
  - hpa.yaml

commonLabels:
  app.kubernetes.io/part-of: hta-platform
  app.kubernetes.io/managed-by: kustomize
