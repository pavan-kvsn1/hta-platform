apiVersion: apps/v1
kind: Deployment
metadata:
  name: hta-api
  namespace: hta-platform
  labels:
    app: hta-api
    app.kubernetes.io/name: hta-api
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hta-api
  template:
    metadata:
      labels:
        app: hta-api
        app.kubernetes.io/name: hta-api
    spec:
      serviceAccountName: api
      containers:
        - name: api
          image: asia-south1-docker.pkg.dev/hta-platform-prod/production-docker/hta-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: hta-config
            - secretRef:
                name: api-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
        # Cloud SQL Auth Proxy sidecar - handles mTLS to Cloud SQL
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.0
          args:
            - "--private-ip"
            - "--structured-logs"
            - "hta-platform-prod:asia-south1:production-postgres"
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: hta-api
                topologyKey: kubernetes.io/hostname
