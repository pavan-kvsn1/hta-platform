apiVersion: apps/v1
kind: Deployment
metadata:
  name: hta-api
  namespace: hta-platform
  labels:
    app: hta-api
    app.kubernetes.io/name: hta-api
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hta-api
  template:
    metadata:
      labels:
        app: hta-api
        app.kubernetes.io/name: hta-api
    spec:
      serviceAccountName: hta-api
      containers:
        - name: api
          image: gcr.io/PROJECT_ID/hta-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hta-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: hta-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hta-secrets
                  key: jwt-secret
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: hta-config
                  key: cors-origins
            - name: GCS_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: hta-config
                  key: gcs-bucket-name
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: hta-api
                topologyKey: kubernetes.io/hostname
