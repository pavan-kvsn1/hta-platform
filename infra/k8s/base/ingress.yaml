apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hta-ingress
  namespace: hta-platform
  labels:
    app.kubernetes.io/name: hta-platform
  annotations:
    # GKE Ingress annotations
    kubernetes.io/ingress.class: "gce"
    # Static IP name from Terraform: module.cloud_armor.ingress_ip_name
    kubernetes.io/ingress.global-static-ip-name: "production-security-policy-ip"

    # SSL/TLS
    networking.gke.io/managed-certificates: "hta-certificate"

    # Health check configuration
    cloud.google.com/backend-config: '{"default": "hta-backend-config"}'
spec:
  rules:
    # API subdomain - dedicated API traffic
    - host: api.hta.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hta-api
                port:
                  number: 80

    # Main app domain - frontend + API routes
    - host: app.hta.example.com
      http:
        paths:
          # API routes (must be first - more specific)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: hta-api
                port:
                  number: 80
          # Frontend (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hta-web
                port:
                  number: 80
---
# Managed Certificate for HTTPS
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: hta-certificate
  namespace: hta-platform
spec:
  domains:
    - api.hta.example.com
    - app.hta.example.com
---
# Backend configuration for health checks and security
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: hta-backend-config
  namespace: hta-platform
spec:
  healthCheck:
    checkIntervalSec: 30
    timeoutSec: 10
    healthyThreshold: 1
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /health
    port: 8080
  securityPolicy:
    # Cloud Armor policy from Terraform: module.cloud_armor.policy_name
    name: "production-security-policy"
  connectionDraining:
    drainingTimeoutSec: 30
