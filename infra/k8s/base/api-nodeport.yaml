apiVersion: v1
kind: Service
metadata:
  name: hta-api-vpn
  namespace: hta-platform
  labels:
    app: hta-api
    app.kubernetes.io/name: hta-api
    app.kubernetes.io/component: vpn-ingress
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
      name: http
  selector:
    app: hta-api
