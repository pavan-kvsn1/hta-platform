# =============================================================================
# GKE Gateway API Configuration
# =============================================================================
# Prerequisites:
#   gcloud container clusters update CLUSTER_NAME --gateway-api=standard
#
# This replaces the older GKE Ingress approach (ingress.yaml)
# =============================================================================

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: hta-gateway
  namespace: hta-platform
  labels:
    app.kubernetes.io/name: hta-platform
  annotations:
    networking.gke.io/pre-shared-certs: mcrt-91136e4b-2072-4a7d-ace8-3363b7f75629,hta-calibration-cert
spec:
  gatewayClassName: gke-l7-global-external-managed
  addresses:
    # Static IP from Terraform: module.cloud_armor.ingress_ip_name
    - type: NamedAddress
      value: production-security-policy-ip
  listeners:
    # HTTP listener (redirects to HTTPS in production)
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    # HTTPS listener with GCP Certificate Manager
    - name: https
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        options:
          networking.gke.io/pre-shared-certs: mcrt-91136e4b-2072-4a7d-ace8-3363b7f75629,hta-calibration-cert
---
# Main routing rules for app subdomain
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hta-app-routes
  namespace: hta-platform
  labels:
    app.kubernetes.io/name: hta-platform
spec:
  parentRefs:
    - name: hta-gateway
      sectionName: http
    - name: hta-gateway
      sectionName: https
  hostnames:
    - "app.hta-calibration.com"
    - "hta-calibration.com"
  rules:
    # NextAuth routes: /api/auth/* -> hta-web (Next.js handles auth)
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: hta-web
          port: 80
    # API path: /api/* -> hta-api (Fastify)
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: hta-api
          port: 80
    # Health check endpoint
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: hta-api
          port: 80
    # Frontend: everything else -> hta-web
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hta-web
          port: 80
---
# GCP Backend Policy for Cloud Armor attachment
apiVersion: networking.gke.io/v1
kind: GCPBackendPolicy
metadata:
  name: hta-api-backend-policy
  namespace: hta-platform
spec:
  default:
    securityPolicy: production-security-policy
  targetRef:
    group: ""
    kind: Service
    name: hta-api
---
apiVersion: networking.gke.io/v1
kind: GCPBackendPolicy
metadata:
  name: hta-web-backend-policy
  namespace: hta-platform
spec:
  default:
    securityPolicy: production-security-policy
  targetRef:
    group: ""
    kind: Service
    name: hta-web
---
# Health check configuration
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: hta-api-health-check
  namespace: hta-platform
spec:
  default:
    checkIntervalSec: 30
    timeoutSec: 10
    healthyThreshold: 1
    unhealthyThreshold: 3
    config:
      type: HTTP
      httpHealthCheck:
        port: 8080
        requestPath: /health
  targetRef:
    group: ""
    kind: Service
    name: hta-api
---
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: hta-web-health-check
  namespace: hta-platform
spec:
  default:
    checkIntervalSec: 30
    timeoutSec: 10
    healthyThreshold: 1
    unhealthyThreshold: 3
    config:
      type: HTTP
      httpHealthCheck:
        port: 3000
        requestPath: /api/health
  targetRef:
    group: ""
    kind: Service
    name: hta-web
