# =============================================================================
# GKE Gateway API Configuration
# =============================================================================
# Prerequisites:
#   gcloud container clusters update CLUSTER_NAME --gateway-api=standard
#
# This replaces the older GKE Ingress approach (ingress.yaml)
# =============================================================================

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: hta-gateway
  namespace: hta-platform
  labels:
    app.kubernetes.io/name: hta-platform
spec:
  gatewayClassName: gke-l7-global-external-managed
  addresses:
    # Static IP from Terraform: module.cloud_armor.ingress_ip_name
    - type: NamedAddress
      value: production-security-policy-ip
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: hta-tls-cert
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
# HTTP to HTTPS redirect
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-redirect
  namespace: hta-platform
spec:
  parentRefs:
    - name: hta-gateway
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
# Main routing rules
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hta-routes
  namespace: hta-platform
  labels:
    app.kubernetes.io/name: hta-platform
spec:
  parentRefs:
    - name: hta-gateway
      sectionName: https
  hostnames:
    - "app.hta.example.com"
    - "api.hta.example.com"
  rules:
    # API subdomain: api.hta.example.com/*
    - matches:
        - headers:
            - type: Exact
              name: ":authority"
              value: api.hta.example.com
      backendRefs:
        - name: hta-api
          port: 80
    # API path on app domain: app.hta.example.com/api/*
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: hta-api
          port: 80
    # Health check endpoint (for monitoring)
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: hta-api
          port: 80
    # Frontend: everything else
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hta-web
          port: 80
---
# GCP Backend Policy for Cloud Armor attachment
apiVersion: networking.gke.io/v1
kind: GCPBackendPolicy
metadata:
  name: hta-api-backend-policy
  namespace: hta-platform
spec:
  default:
    securityPolicy: production-security-policy
  targetRef:
    group: ""
    kind: Service
    name: hta-api
---
apiVersion: networking.gke.io/v1
kind: GCPBackendPolicy
metadata:
  name: hta-web-backend-policy
  namespace: hta-platform
spec:
  default:
    securityPolicy: production-security-policy
  targetRef:
    group: ""
    kind: Service
    name: hta-web
---
# Health check configuration
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: hta-api-health-check
  namespace: hta-platform
spec:
  default:
    checkIntervalSec: 30
    timeoutSec: 10
    healthyThreshold: 1
    unhealthyThreshold: 3
    config:
      type: HTTP
      httpHealthCheck:
        port: 8080
        requestPath: /health
  targetRef:
    group: ""
    kind: Service
    name: hta-api
---
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: hta-web-health-check
  namespace: hta-platform
spec:
  default:
    checkIntervalSec: 30
    timeoutSec: 10
    healthyThreshold: 1
    unhealthyThreshold: 3
    config:
      type: HTTP
      httpHealthCheck:
        port: 3000
        requestPath: /api/health
  targetRef:
    group: ""
    kind: Service
    name: hta-web
