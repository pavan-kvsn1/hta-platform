# =============================================================================
# GKE Gateway API Configuration
# =============================================================================
# Prerequisites:
#   gcloud container clusters update CLUSTER_NAME --gateway-api=standard
#
# This replaces the older GKE Ingress approach (ingress.yaml)
# =============================================================================

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: hta-gateway
  namespace: hta-prod
  labels:
    app.kubernetes.io/name: hta-platform
spec:
  gatewayClassName: gke-l7-global-external-managed
  addresses:
    # Static IP from Terraform: module.cloud_armor.ingress_ip_name
    - type: NamedAddress
      value: production-security-policy-ip
  listeners:
    # HTTP only for initial testing
    # TODO: Add HTTPS listener with GCP Managed Certificate after HTTP is working
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
# Main routing rules for app subdomain
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hta-app-routes
  namespace: hta-prod
  labels:
    app.kubernetes.io/name: hta-platform
spec:
  parentRefs:
    - name: hta-gateway
      sectionName: http
  hostnames:
    - "app.hta-calibration.com"
  rules:
    # API path: /api/* -> hta-api
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: hta-api
          port: 80
    # Health check endpoint
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: hta-api
          port: 80
    # Frontend: everything else -> hta-web
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hta-web
          port: 80
---
# GCP Backend Policy for Cloud Armor attachment
apiVersion: networking.gke.io/v1
kind: GCPBackendPolicy
metadata:
  name: hta-api-backend-policy
  namespace: hta-prod
spec:
  default:
    securityPolicy: production-security-policy
  targetRef:
    group: ""
    kind: Service
    name: hta-api
---
apiVersion: networking.gke.io/v1
kind: GCPBackendPolicy
metadata:
  name: hta-web-backend-policy
  namespace: hta-prod
spec:
  default:
    securityPolicy: production-security-policy
  targetRef:
    group: ""
    kind: Service
    name: hta-web
---
# Health check configuration
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: hta-api-health-check
  namespace: hta-prod
spec:
  default:
    checkIntervalSec: 30
    timeoutSec: 10
    healthyThreshold: 1
    unhealthyThreshold: 3
    config:
      type: HTTP
      httpHealthCheck:
        port: 8080
        requestPath: /health
  targetRef:
    group: ""
    kind: Service
    name: hta-api
---
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: hta-web-health-check
  namespace: hta-prod
spec:
  default:
    checkIntervalSec: 30
    timeoutSec: 10
    healthyThreshold: 1
    unhealthyThreshold: 3
    config:
      type: HTTP
      httpHealthCheck:
        port: 3000
        requestPath: /api/health
  targetRef:
    group: ""
    kind: Service
    name: hta-web
