# =============================================================================
# Argo CD Ingress with IAP (Identity-Aware Proxy)
# =============================================================================
# Exposes Argo CD at: https://argocd.hta-calibration.com
# Protected by Google IAP - only authorized Google accounts can access
# =============================================================================

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: argocd-gateway
  namespace: argocd
  annotations:
    # Reference IAP configuration from Terraform
    networking.gke.io/certmap: argocd-certmap
spec:
  gatewayClassName: gke-l7-global-external-managed
  addresses:
    - type: NamedAddress
      value: argocd-ip  # Created by Terraform
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: argocd
spec:
  parentRefs:
    - name: argocd-gateway
  hostnames:
    - "argocd.hta-calibration.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80
---
# Backend policy for IAP
apiVersion: networking.gke.io/v1
kind: GCPBackendPolicy
metadata:
  name: argocd-iap-policy
  namespace: argocd
spec:
  default:
    iap:
      enabled: true
      oauth2ClientSecretRef:
        name: argocd-iap-secret
  targetRef:
    group: ""
    kind: Service
    name: argocd-server
