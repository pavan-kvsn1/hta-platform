apiVersion: v1
kind: ConfigMap
metadata:
  name: hta-config
  namespace: hta-platform
  labels:
    app.kubernetes.io/name: hta-platform
data:
  # CORS configuration
  CORS_ORIGINS: "https://app.hta.example.com"

  # GCS bucket for certificate images
  GCS_BUCKET: "hta-certificates-prod"

  # Email configuration
  EMAIL_FROM: "HTA Calibration <noreply@htacalibration.com>"

  # Logging level
  LOG_LEVEL: "info"

  # Frontend configuration
  NEXTAUTH_URL: "https://app.hta.example.com"
  API_URL: "https://api.hta.example.com"

  # WireGuard VPN
  WG_SERVER_ENDPOINT: "35.200.149.46:51820"
  WG_DNS: "10.100.0.1"
  WG_PEERS_BUCKET: "hta-platform-prod-wireguard"
