apiVersion: v1
kind: ConfigMap
metadata:
  name: hta-config
  namespace: hta-platform
  labels:
    app.kubernetes.io/name: hta-platform
data:
  # CORS configuration
  cors-origins: "https://app.hta.example.com"

  # GCS bucket for certificate images
  gcs-bucket-name: "hta-certificates-prod"

  # Email configuration
  email-from: "HTA Calibration <noreply@htacalibration.com>"

  # Logging level
  log-level: "info"

  # Frontend configuration
  nextauth-url: "https://app.hta.example.com"
  api-url: "https://api.hta.example.com"
