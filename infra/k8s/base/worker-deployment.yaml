apiVersion: apps/v1
kind: Deployment
metadata:
  name: hta-worker
  namespace: hta-platform
  labels:
    app: hta-worker
    app.kubernetes.io/name: hta-worker
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hta-worker
  template:
    metadata:
      labels:
        app: hta-worker
        app.kubernetes.io/name: hta-worker
    spec:
      serviceAccountName: worker
      containers:
        - name: worker
          image: asia-south1-docker.pkg.dev/hta-platform-prod/production-docker/hta-worker:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: hta-config
            - secretRef:
                name: worker-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # No liveness/readiness probes - worker is not an HTTP server
          # Use startup probe to ensure worker is running
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pgrep -f 'node apps/worker/dist/index.js' > /dev/null"
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
        # Cloud SQL Auth Proxy sidecar - handles mTLS to Cloud SQL
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.0
          args:
            - "--private-ip"
            - "--structured-logs"
            - "hta-platform-prod:asia-south1:production-postgres"
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
