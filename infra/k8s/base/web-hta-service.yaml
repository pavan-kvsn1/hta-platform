apiVersion: v1
kind: Service
metadata:
  name: hta-web
  namespace: hta-platform
  labels:
    app: hta-web
    app.kubernetes.io/name: hta-web
  # Note: BackendConfig annotations removed - using GCPBackendPolicy/HealthCheckPolicy with Gateway API instead
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: hta-web
