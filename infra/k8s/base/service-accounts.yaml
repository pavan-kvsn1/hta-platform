# =============================================================================
# Kubernetes Service Accounts for Workload Identity
# =============================================================================
# These service accounts are bound to GCP service accounts via Workload Identity
# The annotation links the K8s SA to the GCP SA for automatic token injection

apiVersion: v1
kind: ServiceAccount
metadata:
  name: api
  namespace: hta-platform
  labels:
    app.kubernetes.io/name: hta-api
  annotations:
    iam.gke.io/gcp-service-account: production-api@hta-platform-prod.iam.gserviceaccount.com
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: web-hta
  namespace: hta-platform
  labels:
    app.kubernetes.io/name: hta-web
  annotations:
    iam.gke.io/gcp-service-account: production-web@hta-platform-prod.iam.gserviceaccount.com
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: worker
  namespace: hta-platform
  labels:
    app.kubernetes.io/name: hta-worker
  annotations:
    iam.gke.io/gcp-service-account: production-worker@hta-platform-prod.iam.gserviceaccount.com
