name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ===========================================================================
  # DETECT CHANGES
  # ===========================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      worker: ${{ steps.filter.outputs.worker }}
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
            worker:
              - 'apps/worker/**'
              - 'packages/**'
            packages:
              - 'packages/**'

  # ===========================================================================
  # CODE QUALITY
  # ===========================================================================
  code-quality:
    name: Code Quality
    if: false  # Temporarily disabled for E2E debugging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Clients
        run: |
          pnpm --filter @hta/database db:generate
          pnpm --filter @hta/web-tenant-template db:generate

      - name: Lint
        run: pnpm turbo run lint

      - name: Type check
        run: pnpm turbo run typecheck

  # ===========================================================================
  # UNIT TESTS
  # ===========================================================================
  unit-tests:
    name: Unit Tests
    if: false  # Temporarily disabled for E2E debugging
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Clients
        run: |
          pnpm --filter @hta/database db:generate
          pnpm --filter @hta/web-tenant-template db:generate

      - name: Run unit tests
        run: pnpm turbo run test:unit

  # ===========================================================================
  # INTEGRATION TESTS
  # ===========================================================================
  integration-tests:
    name: Integration Tests
    if: false  # Temporarily disabled for E2E debugging
    runs-on: ubuntu-latest
    needs: [code-quality]
    # Removed path filter - always run integration tests for safety

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hta_test
          POSTGRES_PASSWORD: hta_test_password
          POSTGRES_DB: hta_calibration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hta_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup database
        run: |
          pnpm --filter @hta/database db:generate
          pnpm --filter @hta/web-tenant-template db:generate
          pnpm --filter @hta/database db:push
        env:
          DATABASE_URL: postgresql://hta_test:hta_test_password@localhost:5432/hta_calibration_test

      - name: Run integration tests
        # Run sequentially (--concurrency=1) to avoid race conditions on shared database
        run: pnpm turbo run test:integration --concurrency=1
        env:
          DATABASE_URL: postgresql://hta_test:hta_test_password@localhost:5432/hta_calibration_test
          REDIS_URL: redis://localhost:6379

  # ===========================================================================
  # BUILD
  # ===========================================================================
  build:
    name: Build
    if: false  # Temporarily disabled for E2E debugging
    runs-on: ubuntu-latest
    needs: [code-quality, changes]
    strategy:
      matrix:
        include:
          - app: api
            dockerfile: apps/api/Dockerfile
          - app: worker
            dockerfile: apps/worker/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Clients
        run: pnpm --filter @hta/database db:generate

      - name: Build package
        run: pnpm turbo run build --filter=@hta/${{ matrix.app }}

      - name: Build Docker image (dry run)
        run: |
          docker build -f ${{ matrix.dockerfile }} -t hta-${{ matrix.app }}:test .

  # ===========================================================================
  # E2E TESTS (Sharded for parallelism)
  # ===========================================================================
  e2e-tests:
    name: E2E Tests (Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    # Temporarily removed dependencies for E2E debugging
    # needs: [unit-tests, integration-tests, build]
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hta_test
          POSTGRES_PASSWORD: hta_test_password
          POSTGRES_DB: hta_calibration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hta_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma clients
        run: |
          pnpm --filter @hta/database db:generate
          pnpm --filter @hta/web db:generate

      - name: Setup and seed database
        run: |
          pnpm --filter @hta/web db:push
          pnpm --filter @hta/web db:seed
        env:
          DATABASE_URL: postgresql://hta_test:hta_test_password@localhost:5432/hta_calibration_test

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @hta/web exec playwright install chromium --with-deps

      - name: Install Playwright browser dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @hta/web exec playwright install-deps chromium

      - name: Create auth directory
        run: mkdir -p apps/web-hta/e2e/.auth

      - name: Build database package
        run: pnpm --filter @hta/database build

      - name: Build shared package
        run: pnpm --filter @hta/shared build

      - name: Build API server
        run: pnpm --filter @hta/api build

      - name: Build web app
        run: pnpm --filter @hta/web build
        env:
          DATABASE_URL: postgresql://hta_test:hta_test_password@localhost:5432/hta_calibration_test
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXTAUTH_SECRET: test-secret-for-ci
          AUTH_SECRET: test-secret-for-ci
          JWT_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000
          CI: true

      - name: Start API server
        run: |
          pnpm --filter @hta/api start &
          # Wait for API to be ready
          for i in {1..30}; do
            curl -s http://localhost:4000/health && break
            sleep 1
          done
        env:
          DATABASE_URL: postgresql://hta_test:hta_test_password@localhost:5432/hta_calibration_test
          JWT_SECRET: test-secret-for-ci
          AUTH_SECRET: test-secret-for-ci
          REDIS_URL: redis://localhost:6379
          PORT: 4000
          CORS_ORIGINS: http://localhost:3000

      - name: Start web server
        run: |
          # Create destination directories and copy static files (required for standalone mode)
          mkdir -p apps/web-hta/.next/standalone/apps/web-hta/.next
          mkdir -p apps/web-hta/.next/standalone/apps/web-hta/public
          cp -r apps/web-hta/.next/static apps/web-hta/.next/standalone/apps/web-hta/.next/
          cp -r apps/web-hta/public/* apps/web-hta/.next/standalone/apps/web-hta/public/ 2>/dev/null || true
          # Verify files were copied
          echo "Static files copied:"
          ls -la apps/web-hta/.next/standalone/apps/web-hta/.next/static | head -5
          # Start standalone server
          node apps/web-hta/.next/standalone/apps/web-hta/server.js &
          SERVER_PID=$!
          sleep 5
          # Check process is alive
          ps -p $SERVER_PID || { echo "Server process died"; exit 1; }
          # Health check using /api/auth/csrf (root path returns 404, but this endpoint always returns 200)
          curl -sf http://127.0.0.1:3000/api/auth/csrf > /dev/null || { echo "Server not responding"; exit 1; }
          # Verify static JS files are accessible
          echo "Checking static file serving..."
          WEBPACK_FILE=$(ls apps/web-hta/.next/static/chunks/webpack-*.js 2>/dev/null | head -1 | xargs basename)
          if [ -n "$WEBPACK_FILE" ]; then
            curl -sf "http://127.0.0.1:3000/_next/static/chunks/$WEBPACK_FILE" > /dev/null && echo "Static JS files serving OK" || echo "WARNING: Static JS files not accessible"
          fi
          echo "Server is ready!"
        env:
          DATABASE_URL: postgresql://hta_test:hta_test_password@localhost:5432/hta_calibration_test
          NEXTAUTH_SECRET: test-secret-for-ci
          AUTH_SECRET: test-secret-for-ci
          JWT_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:4000
          PORT: 3000
          HOSTNAME: 0.0.0.0
          CI: true  # Relax CSP for E2E tests

      - name: Run E2E tests (sharded)
        run: |
          pnpm --filter @hta/web exec playwright test \
            --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          SKIP_WEB_SERVER: true
          DATABASE_URL: postgresql://hta_test:hta_test_password@localhost:5432/hta_calibration_test
          NEXTAUTH_SECRET: test-secret-for-ci
          AUTH_SECRET: test-secret-for-ci
          JWT_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shardIndex }}
          path: apps/web-hta/playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots-shard-${{ matrix.shardIndex }}
          path: apps/web-hta/test-results/
          retention-days: 7
