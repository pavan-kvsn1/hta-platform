name: Deploy to GKE

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/worker/**"
      - "apps/web-hta/**"
      - "packages/**"
      - "infra/k8s/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "production"
        type: choice
        options:
          - production
      services:
        description: "Services to deploy (comma-separated: api,worker or 'all')"
        required: true
        default: "all"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER_NAME }}
  GKE_ZONE: ${{ secrets.GKE_ZONE }}
  GAR_LOCATION: asia-south1
  REPOSITORY: hta-platform

jobs:
  # ===========================================================================
  # DETECT CHANGES
  # ===========================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      worker: ${{ steps.filter.outputs.worker }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
            worker:
              - 'apps/worker/**'
              - 'packages/**'
            web:
              - 'apps/web-hta/**'
              - 'packages/**'

  # ===========================================================================
  # BUILD AND PUSH IMAGES
  # ===========================================================================
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
            changed: ${{ needs.changes.outputs.api }}
          - service: worker
            dockerfile: apps/worker/Dockerfile
            changed: ${{ needs.changes.outputs.worker }}
          - service: web
            dockerfile: apps/web-hta/Dockerfile
            changed: ${{ needs.changes.outputs.web }}
    steps:
      - name: Skip if unchanged
        if: matrix.changed != 'true' && github.event_name != 'workflow_dispatch'
        run: echo "Skipping ${{ matrix.service }} - no changes detected"

      - uses: actions/checkout@v4
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'

      - name: Authenticate to Google Cloud
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for GAR
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Build and push Docker image
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/hta-${{ matrix.service }}"

          # Build with commit SHA tag
          docker build \
            -f ${{ matrix.dockerfile }} \
            -t ${IMAGE}:${{ github.sha }} \
            -t ${IMAGE}:latest \
            .

          # Push both tags
          docker push ${IMAGE}:${{ github.sha }}
          docker push ${IMAGE}:latest

    outputs:
      api_image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/hta-api:${{ github.sha }}
      worker_image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/hta-worker:${{ github.sha }}

  # ===========================================================================
  # DEPLOY TO GKE
  # ===========================================================================
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: [changes, build-push]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tags in Kustomize
        run: |
          cd infra/k8s/overlays/production

          # Update API image if changed
          if [[ "${{ needs.changes.outputs.api }}" == "true" ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            kustomize edit set image gcr.io/PROJECT_ID/hta-api=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/hta-api:${{ github.sha }}
          fi

          # Update Worker image if changed
          if [[ "${{ needs.changes.outputs.worker }}" == "true" ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            kustomize edit set image gcr.io/PROJECT_ID/hta-worker=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/hta-worker:${{ github.sha }}
          fi

          # Update Web image if changed
          if [[ "${{ needs.changes.outputs.web }}" == "true" ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            kustomize edit set image gcr.io/PROJECT_ID/hta-web=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/hta-web:${{ github.sha }}
          fi

      - name: Deploy to GKE
        run: |
          kubectl apply -k infra/k8s/overlays/production

          # Wait for rollout
          if [[ "${{ needs.changes.outputs.api }}" == "true" ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            kubectl -n hta-platform rollout status deployment/hta-api --timeout=300s
          fi

          if [[ "${{ needs.changes.outputs.worker }}" == "true" ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            kubectl -n hta-platform rollout status deployment/hta-worker --timeout=300s
          fi

          if [[ "${{ needs.changes.outputs.web }}" == "true" ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            kubectl -n hta-platform rollout status deployment/hta-web --timeout=300s
          fi

      - name: Verify deployment
        run: |
          echo "=== Deployment Status ==="
          kubectl -n hta-platform get deployments
          echo ""
          echo "=== Pods ==="
          kubectl -n hta-platform get pods
          echo ""
          echo "=== Services ==="
          kubectl -n hta-platform get services

  # ===========================================================================
  # POST-DEPLOY VERIFICATION
  # ===========================================================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Health check
        run: |
          # Wait for service to be ready
          sleep 30

          # Check API health endpoint
          API_URL="${{ secrets.API_HEALTH_URL }}"
          if [ -n "$API_URL" ]; then
            response=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL")
            if [ "$response" != "200" ]; then
              echo "Health check failed with status $response"
              exit 1
            fi
            echo "API health check passed"
          else
            echo "API_HEALTH_URL not configured, skipping health check"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment verification failed!"
          # Add Slack/Discord notification here if needed
